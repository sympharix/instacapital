# docker-compose.fleet.yml
# Minimal Binihost Fleet deployment.
# Services: db (Postgres), backend (Django/Daphne)

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instacapital}
      POSTGRES_USER: ${POSTGRES_USER:-insta_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insta_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insta_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sympharix/instacapital-backend:458d963b2ecb787c02fad288d7a0587a2447bab2
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://insta_user:insta_password@db:5432/instacapital}
      REDIS_URL: ${REDIS_URL:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
