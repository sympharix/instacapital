services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instacapital}
      POSTGRES_USER: ${POSTGRES_USER:-insta_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insta_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sympharix/instacapital-backend:latest
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://insta_user:insta_password@db:5432/instacapital}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: ghcr.io/sympharix/instacapital-backend:latest
    command: celery -A core worker -l info --concurrency 2
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://insta_user:insta_password@db:5432/instacapital}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - media_data:/app/media
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: ghcr.io/sympharix/instacapital-frontend:latest
    ports:
      - "80:80"
    volumes:
      - media_data:/media:ro
      - static_data:/staticfiles:ro
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    env_file: .env
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  media_data:
  static_data:
  n8n_data:
