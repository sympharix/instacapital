services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: celery -A core worker -l info --concurrency 2
    env_file: .env
    volumes:
      - media_data:/app/media
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - media_data:/media:ro
      - static_data:/staticfiles:ro
    restart: always
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    env_file: .env
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  postgres_data:
  media_data:
  static_data:
  n8n_data:
